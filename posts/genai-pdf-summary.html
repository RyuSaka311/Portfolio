        <p>長文PDFを一度に要約するより、段階を分けた方が精度と再現性が上がります。</p>
        <h2>1. 前処理</h2>
        <p>PDF抽出テキストを章単位に分割し、見出しやページ情報をメタデータとして保持します。</p>

        <p>中間要約を統合して全体要約を作成し、原文の参照位置を残して検証可能性を確保します。</p>
