        <h1>Azure VM 初期構築チェックリスト</h1>
        <p class="meta">2026-03-03 | Azure</p>
        <p>VMは作成後の初期設定が品質を左右します。最低限の確認項目を短くまとめます。</p>
        <h2>1. ネットワーク制御</h2>
        <p>NSGで必要ポートだけを開放し、管理アクセス元IPを絞ります。</p>
        <h2>2. 監視と通知</h2>
        <p>CPU、メモリ、ディスク空き容量を監視し、閾値超過で通知されるよう設定します。</p>
        <h2>3. バックアップと復旧テスト</h2>
        <p>Azure Backup を有効化し、実際に復旧テストまで実施して手順を確定します。</p>
